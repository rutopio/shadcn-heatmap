<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Beautiful, accessible heatmap components for React. GitHub-style contribution graphs, weekday/hour patterns, and date/hour matrices. Built with shadcn/ui conventions."
    />
    <meta property="og:title" content="shadcn-heatmap — composable React heatmap components" />
    <meta
      property="og:description"
      content="Beautiful, accessible heatmap components for React. GitHub-style contribution graphs, weekday/hour patterns, and date/hour matrices. Built with shadcn/ui conventions."
    />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#ffffff" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#09090b" />
    <title>shadcn-heatmap — composable React heatmap components</title>
    <script>
      (() => {
        try {
          const stored = localStorage.getItem("theme");
          const prefersDark = window.matchMedia(
            "(prefers-color-scheme: dark)",
          ).matches;
          const isDark = stored ? stored === "dark" : prefersDark;
          if (isDark) document.documentElement.classList.add("dark");
        } catch (e) {
          // ignore
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
